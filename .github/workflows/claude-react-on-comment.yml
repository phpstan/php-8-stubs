name: "Claude React on comment"

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request_review:
    types: [submitted]
  pull_request_review_comment:
    types: [created]

permissions:
  contents: write
  pull-requests: write
  issues: write
  actions: read

concurrency:
  group: claude-pr-reactions-${{ github.event.pull_request.number || github.event.issue.number }}
  cancel-in-progress: false

jobs:
  check-trigger:
    name: "Check trigger phrase"
    runs-on: ubuntu-latest
    timeout-minutes: 1
    outputs:
      triggered: ${{ steps.check.outputs.triggered }}
    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: "Check for trigger phrase"
        id: check
        env:
          COMMENT_BODY: ${{ github.event.comment.body || github.event.review.body || github.event.issue.body || '' }}
        run: |
          if echo "$COMMENT_BODY" | grep -qF "@phpstan-bot"; then
            echo "triggered=true" >> "$GITHUB_OUTPUT"
          else
            echo "triggered=false" >> "$GITHUB_OUTPUT"
          fi

  react:
    name: "React on comment"
    needs: check-trigger
    if: needs.check-trigger.outputs.triggered == 'true'
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Harden the runner (Audit all outbound calls)
        uses: step-security/harden-runner@5ef0c079ce82195b2a36a210272d6b661572d83e # v2.14.2
        with:
          egress-policy: audit

      - name: "Checkout"
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: "React to feedback"
        uses: anthropics/claude-code-action@35a9e0292d36f1186f5d842b14eb575074e8b450 # v1.0.57
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          trigger_phrase: "@phpstan-bot"
          claude_args: "--model claude-opus-4-6"
          bot_name: "phpstan-bot"
          bot_id: "79867460"
          additional_permissions: |
            actions: read
